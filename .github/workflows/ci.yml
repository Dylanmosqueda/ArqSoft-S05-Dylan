name: CI

on:
  push:
    branches: [ "CI/CD", "main", "master" ]
  pull_request:
    branches: [ "CI/CD", "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restaurar dependencias
      run: dotnet restore CitasApp.slnx

    - name: Compilar
      run: dotnet build CitasApp.slnx --no-restore

    - name: Ejecutar pruebas
      run: dotnet test CitasApp.slnx --no-restore --verbosity normal
