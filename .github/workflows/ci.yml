name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar
        run: dotnet restore

      - name: Compilar
        run: dotnet build --no-restore

      - name: Correr pruebas
        run: dotnet test --no-build --verbosity normal
